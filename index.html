<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>あなたにぴったりのお酒を探す</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #faf6f2;
      --surface:   #ffffff;
      --card:      #fdf9f6;
      --border:    rgba(180,100,80,0.1);
      --accent:    #c4786c;
      --accent2:   #e8a87c;
      --text:      #3a2f2c;
      --muted:     #a89890;
      --radius:    20px;
      --shadow:    0 4px 24px rgba(180,100,80,0.09);
      --shadow-lg: 0 10px 40px rgba(180,100,80,0.14);
      --trans:     0.3s cubic-bezier(0.4,0,0.2,1);
    }
    html, body {
      height: 100%;
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ===== SOFT WARM BACKGROUND ===== */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 5% 5%,  rgba(232,168,124,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 55% 65% at 95% 95%, rgba(196,120,108,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 20%, rgba(255,235,220,0.20) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ===== LAYOUT ===== */
    #app {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px;
    }

    /* ===== SCREENS ===== */
    .screen {
      width: 100%; max-width: 720px;
      display: none;
      animation: fadeUp 0.45s var(--trans) both;
    }
    .screen.active { display: flex; flex-direction: column; align-items: center; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== WELCOME SCREEN ===== */
    #screen-welcome { text-align: center; gap: 32px; }
    .welcome-illustration {
      position: relative; display: inline-block;
      margin-bottom: 4px;
    }
    .welcome-icon-main {
      font-size: 110px;
      display: block;
      animation: float 3.5s ease-in-out infinite;
      filter: drop-shadow(0 8px 20px rgba(196,120,108,0.25));
    }
    .welcome-deco {
      position: absolute; font-size: 30px;
      animation: floatSlow 4s ease-in-out infinite;
    }
    .welcome-deco-1 { top: 0px;  left: -38px; animation-delay: -1s; }
    .welcome-deco-2 { top: 10px; right: -36px; animation-delay: -2s; }
    .welcome-deco-3 { bottom: 0; left: 10px;  animation-delay: -0.5s; font-size:22px; }
    @keyframes float     { 0%,100%{transform:translateY(0)}    50%{transform:translateY(-10px)} }
    @keyframes floatSlow { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-7px) rotate(8deg)} }

    .welcome-title {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.35;
      color: var(--text);
    }
    .welcome-title em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .welcome-sub {
      font-size: clamp(17px, 2.4vw, 20px);
      color: var(--muted);
      line-height: 1.85;
      max-width: 480px;
    }
    .welcome-steps {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    }
    .step-badge {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 50px; padding: 10px 20px;
      font-size: 15px; color: var(--muted);
      display: flex; align-items: center; gap: 7px;
      box-shadow: 0 2px 8px rgba(180,100,80,0.06);
    }
    .step-badge span { color: var(--accent); font-weight: 700; }

    /* ===== PROGRESS BAR ===== */
    .progress-wrap { width: 100%; margin-bottom: 6px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 15px; color: var(--muted); margin-bottom: 8px;
    }
    .progress-bar {
      height: 6px; background: rgba(180,100,80,0.1); border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px;
      transition: width 0.5s var(--trans);
    }

    /* ===== QUESTION SCREEN ===== */
    #screen-question {
      gap: 16px;
      overflow-y: auto; max-height: 100vh; padding-bottom: 24px;
      scrollbar-width: none;
    }
    #screen-question::-webkit-scrollbar { display: none; }
    .question-card {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 30px 26px 26px;
      box-shadow: var(--shadow);
    }
    .question-step {
      font-size: 14px; color: var(--accent); letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 10px; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
    }
    .question-step::before {
      content: ''; display: inline-block;
      width: 20px; height: 2px; background: var(--accent); border-radius: 1px;
    }
    .question-text {
      font-size: clamp(20px, 3.5vw, 27px);
      font-weight: 700; line-height: 1.45; margin-bottom: 6px;
      color: var(--text);
    }
    .question-hint {
      font-size: 16px; color: var(--muted); margin-bottom: 24px; line-height: 1.6;
    }
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(165px, 1fr));
      gap: 10px;
    }
    /* 6個以上の選択肢 → コンパクト4列レイアウト */
    .options-grid.many {
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 9px;
    }
    .options-grid.many .option-btn {
      min-height: 90px; padding: 14px 10px 12px; gap: 7px;
    }
    .options-grid.many .option-icon { font-size: 30px; }
    .options-grid.many .option-label { font-size: 14px; }
    .options-grid.many .option-sub   { font-size: 12px; }
    .option-btn {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 18px 14px 16px;
      cursor: pointer;
      transition: all var(--trans);
      text-align: center;
      color: var(--text);
      font-family: inherit;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      min-height: 100px; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .option-btn:hover, .option-btn:focus {
      border-color: var(--accent);
      background: #fff8f6;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(196,120,108,0.18);
      outline: none;
    }
    .option-btn.selected {
      border-color: var(--accent);
      background: rgba(196,120,108,0.07);
      box-shadow: 0 0 0 3px rgba(196,120,108,0.15);
    }
    .option-btn.selected .option-icon { transform: scale(1.1); }
    .option-icon { font-size: 36px; transition: transform var(--trans); }
    .option-label { font-weight: 700; font-size: 16px; color: var(--text); line-height: 1.3; }
    .option-sub   { font-size: 14px; color: var(--muted); line-height: 1.4; }

    /* ===== RESULT SCREEN ===== */
    #screen-result {
      gap: 20px; width: 100%; max-width: 800px;
      overflow-y: auto; max-height: 100vh; padding-bottom: 32px;
      scrollbar-width: thin; scrollbar-color: rgba(196,120,108,0.3) transparent;
    }
    #screen-result::-webkit-scrollbar { width: 4px; }
    #screen-result::-webkit-scrollbar-thumb { background: rgba(196,120,108,0.3); border-radius: 2px; }

    .result-header { text-align: center; padding-top: 8px; }
    .result-header-emoji { font-size: 62px; margin-bottom: 10px; display: block; }
    .result-title {
      font-size: clamp(23px, 4.5vw, 36px);
      font-weight: 700; line-height: 1.3;
      color: var(--text); margin-bottom: 6px;
    }
    .result-title em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-sub { font-size: 16px; color: var(--muted); line-height: 1.7; }

    /* Profile bars */
    .profile-bar-wrap {
      width: 100%; background: var(--surface);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 18px 22px;
      box-shadow: var(--shadow);
    }
    .profile-bar-title {
      font-size: 14px; color: var(--accent); font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px;
    }
    .profile-bars { display: flex; flex-direction: column; gap: 10px; }
    .profile-bar-row { display: flex; align-items: center; gap: 10px; }
    .profile-bar-label { font-size: 14px; color: var(--muted); width: 72px; flex-shrink: 0; text-align: right; }
    .profile-bar-bg { flex: 1; height: 7px; background: rgba(180,100,80,0.08); border-radius: 4px; overflow: hidden; }
    .profile-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 1s var(--trans); }

    /* Product cards */
    .products-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .product-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 17px 17px;
      box-shadow: var(--shadow);
      display: flex; flex-direction: column; gap: 9px;
      position: relative; overflow: hidden;
      animation: fadeUp 0.45s var(--trans) both;
      transition: transform var(--trans), box-shadow var(--trans);
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .product-card.rank-1 { border-color: rgba(196,120,108,0.45); }
    .product-card.rank-2 { border-color: rgba(196,120,108,0.25); }
    .product-card.rank-3 { border-color: rgba(196,120,108,0.15); }

    .rank-badge {
      position: absolute; top: 13px; right: 13px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      padding: 3px 10px; border-radius: 50px;
    }
    .rank-1 .rank-badge { background: rgba(196,120,108,0.12); color: var(--accent); }
    .rank-2 .rank-badge { background: rgba(196,120,108,0.07); color: var(--accent2); }
    .rank-3 .rank-badge { background: rgba(196,120,108,0.05); color: #c9a88a; }
    .rank-4 .rank-badge, .rank-5 .rank-badge { background: rgba(180,160,150,0.08); color: var(--muted); }

    .product-icon { font-size: 38px; }
    .product-type { font-size: 13px; color: var(--accent); letter-spacing: 0.1em; font-weight: 700; text-transform: uppercase; }
    .product-name { font-size: 18px; font-weight: 700; line-height: 1.35; color: var(--text); }
    .product-desc { font-size: 15px; color: var(--muted); line-height: 1.65; }

    .product-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      background: rgba(196,120,108,0.07);
      border: 1px solid rgba(196,120,108,0.15);
      border-radius: 50px; padding: 3px 11px;
      font-size: 13px; color: var(--accent);
    }
    .product-price {
      font-size: 20px; font-weight: 700; color: var(--text);
    }
    .price-tax { font-size: 13px; color: var(--muted); font-weight: 400; margin-left: 2px; }

    /* Pairing */
    .product-pairing {
      background: rgba(196,120,108,0.05);
      border-radius: 10px; padding: 9px 12px;
      font-size: 14px; color: var(--muted); line-height: 1.6;
    }
    .pairing-label {
      font-size: 13px; font-weight: 700; color: var(--accent);
      letter-spacing: 0.08em; display: block; margin-bottom: 3px;
    }

    /* Product image */
    .product-img-wrap {
      width: 100%; aspect-ratio: 1/1; max-height: 140px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; border-radius: 10px;
      background: rgba(196,120,108,0.04);
    }
    .product-img-wrap img {
      max-width: 100%; max-height: 140px;
      object-fit: contain;
    }

    .match-score { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .match-stars { color: var(--accent); font-size: 16px; letter-spacing: -1px; }
    .match-label { font-size: 14px; color: var(--muted); }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 18px 40px; border-radius: 50px;
      font-size: 18px; font-weight: 700; font-family: inherit;
      cursor: pointer; border: none;
      transition: all var(--trans);
      letter-spacing: 0.04em;
      min-width: 220px; min-height: 60px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #ffffff;
      box-shadow: 0 4px 18px rgba(196,120,108,0.38);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(196,120,108,0.48);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-ghost {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--muted);
      box-shadow: 0 2px 8px rgba(180,100,80,0.06);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

    /* ===== TOUCH RIPPLE ===== */
    .ripple { position: relative; overflow: hidden; }
    .ripple-effect {
      position: absolute; border-radius: 50%;
      background: rgba(196,120,108,0.2);
      transform: scale(0);
      animation: rippleAnim 0.55s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

    /* ===== SWIPE SCREEN ===== */
    #screen-swipe { gap: 14px; overflow-y: auto; max-height: 100vh; padding-bottom: 24px; scrollbar-width: none; }
    #screen-swipe::-webkit-scrollbar { display: none; }

    .swipe-header { width: 100%; text-align: center; }
    .swipe-hint { font-size: 17px; color: var(--muted); margin-bottom: 6px; }
    .swipe-counter { font-size: 16px; color: var(--accent); font-weight: 700; letter-spacing: 0.05em; margin-bottom: 6px; }
    .swipe-dots { display: flex; gap: 7px; justify-content: center; }
    .swipe-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(180,100,80,0.15);
      transition: all var(--trans);
    }
    .swipe-dot.done    { background: var(--accent); }
    .swipe-dot.current { background: var(--accent2); transform: scale(1.4); }

    .swipe-card-wrap { width: 100%; display: flex; justify-content: center; }
    .swipe-card {
      width: 100%; max-width: 340px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      transition: transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s;
    }
    .swipe-card.out-yes { transform: translateX(150%) rotate(22deg); opacity: 0; }
    .swipe-card.out-no  { transform: translateX(-150%) rotate(-22deg); opacity: 0; }
    .swipe-card.out-meh { transform: scale(0.8) translateY(-30px); opacity: 0; }

    .swipe-img-wrap {
      width: 100%; height: 240px;
      background: #fdf9f6;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .swipe-img-wrap img { max-width: 100%; max-height: 240px; object-fit: contain; }
    .swipe-img-wrap .swipe-icon { font-size: 80px; }

    .swipe-card-info { padding: 14px 18px 16px; }
    .swipe-card-type  { font-size: 14px; color: var(--accent); font-weight: 700; letter-spacing: 0.1em; margin-bottom: 4px; }
    .swipe-card-name  { font-size: 19px; font-weight: 700; line-height: 1.35; color: var(--text); }
    .swipe-card-price { font-size: 16px; color: var(--muted); margin-top: 4px; }

    .swipe-btns { display: flex; gap: 10px; justify-content: center; width: 100%; }
    .swipe-btn {
      flex: 1; max-width: 130px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 15px 10px 13px;
      border-radius: 16px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; border: 2px solid var(--border);
      background: var(--surface); color: var(--muted);
      transition: all var(--trans);
      -webkit-tap-highlight-color: transparent;
    }
    .swipe-btn-icon { font-size: 34px; line-height: 1; }
    .swipe-no:hover  { border-color: #bbb; color: #888; transform: translateY(-2px); }
    .swipe-meh:hover { border-color: var(--accent2); color: var(--accent2); transform: translateY(-2px); }
    .swipe-yes:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); background: rgba(196,120,108,0.06); }
    .swipe-no:active  { transform: translateY(0); }
    .swipe-meh:active { transform: translateY(0); }
    .swipe-yes:active { transform: translateY(0); }
    .swipe-yes { box-shadow: 0 4px 14px rgba(196,120,108,0.18); }

    @media (min-width: 768px) {
      .swipe-card { max-width: 460px; }
      .swipe-img-wrap { height: 320px; }
      .swipe-img-wrap img { max-height: 320px; }
      .swipe-img-wrap .swipe-icon { font-size: 110px; }
      .swipe-card-info { padding: 18px 22px 20px; }
      .swipe-card-name { font-size: 23px; }
      .swipe-card-type { font-size: 17px; }
      .swipe-card-price { font-size: 19px; }
      .swipe-btn { max-width: 160px; padding: 18px 12px 16px; font-size: 17px; }
      .swipe-btn-icon { font-size: 42px; }
      .swipe-hint { font-size: 20px; }
      .swipe-counter { font-size: 18px; }
      .swipe-dot { width: 11px; height: 11px; }
    }

    /* ===== CARD SELECTION ===== */
    .product-card { cursor: pointer; }
    .product-card.selected-card {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(196,120,108,0.3), var(--shadow-lg) !important;
      transform: translateY(-4px);
    }
    .product-card.selected-card::after {
      content: '✓ 選択中';
      position: absolute; top: 13px; left: 13px;
      font-size: 11px; font-weight: 700; color: var(--accent);
      background: rgba(196,120,108,0.1);
      border-radius: 50px; padding: 3px 10px;
    }
    .select-hint {
      text-align: center; font-size: 14px; color: var(--muted);
      padding: 4px 0; transition: opacity var(--trans);
    }
    .select-hint.hidden { opacity: 0; pointer-events: none; }

    /* ===== QR CODE ===== */
    .qr-wrap {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 20px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .qr-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .qr-desc  { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 16px; }
    .qr-code-box {
      display: inline-block;
      padding: 12px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(180,100,80,0.1);
      margin-bottom: 12px;
    }
    .qr-code-box canvas, .qr-code-box img { display: block; }
    .qr-note { font-size: 11px; color: var(--muted); line-height: 1.8; }
    @media (min-width: 768px) {
      .qr-title { font-size: 21px; }
      .qr-desc  { font-size: 18px; }
      .qr-note  { font-size: 16px; }
    }

    /* ===== PRINT MAIN BUTTON ===== */
    .btn-print-main {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 15px 34px; border-radius: 50px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; border: 2px solid var(--accent);
      background: var(--surface); color: var(--accent);
      transition: all var(--trans);
      min-width: 220px; min-height: 60px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-print-main:disabled {
      border-color: var(--border); color: var(--muted);
      cursor: default; opacity: 0.6;
    }
    .btn-print-main:not(:disabled):hover {
      background: var(--accent); color: #fff;
      box-shadow: 0 4px 18px rgba(196,120,108,0.38);
    }
    @media (min-width: 768px) {
      .product-card.selected-card::after { font-size: 15px; }
      .select-hint { font-size: 19px; }
      .btn-print-main { font-size: 22px; padding: 20px 46px; min-height: 64px; }
    }

    /* ===== PRINT BUTTON (old, now unused) ===== */
    .btn-print {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 6px; width: 100%;
      padding: 10px 0; border-radius: 10px;
      font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--muted);
      transition: all var(--trans);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-print:hover { border-color: var(--accent); color: var(--accent); background: #fff8f6; }

    /* ===== PRINT SLIP (hidden on screen) ===== */
    #print-slip { display: none; }

    @media print {

  const el = document.getElementById('product-count');
  if (el && typeof PRODUCTS !== 'undefined') el.textContent = PRODUCTS.length.toLocaleString();

  // QRコードからの好み復元
  const params = new URLSearchParams(window.location.search);
  const p = params.get('p');
  const g = params.get('g');
  if (p && g) {
    const vals = p.split('-').map(Number);
    const keys = ['sweet','bitter','acid','body','strong','fruity'];
    if (vals.length === 6 && vals.every(v => v >= 1 && v <= 5)) {
      keys.forEach((k, i) => { userProfile[k] = vals[i]; });
      selectedGenre = g;
      // ウェルカム画面に復元メッセージを表示してから結果へ
      showQrRestoredBanner();
    }
  }
});

  const banner = document.createElement('div');
  banner.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:700;z-index:999;box-shadow:0 4px 18px rgba(196,120,108,0.4);';

  const u = userProfile;

    .map(k => Math.round(u[k] || 2)).join('-');
  const base = window.location.origin + window.location.pathname;
  const url = `${base}?g=${encodeURIComponent(selectedGenre)}&p=${vals}`;

    text: url,
    width: 180, height: 180,
    colorDark: '#3a2f2c',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

/* ===================================================
   STATE
=================================================== */
let currentQ = 0;           // 0 = ジャンル選択, 1以降 = ジャンル別Q
let answers = [];
let selectedGenre = 'なんでも';
let selectedSubTypes = null; // 焼酎サブジャンル等の追加絞り込み
let userProfile = { sweet: 3, bitter: 2, acid: 2, body: 2, strong: 2, fruity: 2 };
let lastResults = [];
let selectedProductIds = new Set();
let selectedSwipeKeyword = null; // ワイン色絞り込み等

function currentGenreQuestions() {
  return GENRE_QUESTIONS[selectedGenre] || GENRE_QUESTIONS['なんでも'];
}
function totalQuestions() {
  return 1 + currentGenreQuestions().length;
}

/* ===================================================
   SWIPE
=================================================== */
let swipeProducts = [];
let swipeIndex = 0;

function getSwipeProducts() {
  const cats = SWIPE_GENRE_MAP[selectedGenre];
  if (!cats) return [];
  const set = new Set(cats);
  const popularity = (typeof PRODUCT_POPULARITY !== 'undefined') ? PRODUCT_POPULARITY : {};

  const instock = (typeof PRODUCT_INSTOCK !== 'undefined') ? PRODUCT_INSTOCK : null;
  let pool = PRODUCTS.filter(p => set.has(p.type) && p.image && (!instock || instock[p.id]));

  // ワイン色等のキーワードで絞り込み
  if (selectedSwipeKeyword) {
    const kw = selectedSwipeKeyword;
    const filtered = pool.filter(p =>
      p.desc.includes(kw) || p.name.includes(kw) || (p.tags || []).some(t => t.includes(kw))
    );
    if (filtered.length >= 4) pool = filtered; // 4件以上あれば絞り込む
  }

  // サブカテゴリごとに分けて、各カテゴリ内は人気順に並べる
  const byType = {};
  pool.forEach(p => { (byType[p.type] = byType[p.type] || []).push(p); });
  Object.values(byType).forEach(arr => {
    arr.sort((a, b) => (popularity[b.id] || 0) - (popularity[a.id] || 0));
  });

  // 各カテゴリから人気1位→人気2位→...の順でラウンドロビン
  const types = Object.keys(byType);
  const selected = [];
  for (let round = 0; selected.length < 8; round++) {
    let added = false;
    for (const t of types) {
      if (byType[t][round]) { selected.push(byType[t][round]); added = true; }
      if (selected.length >= 8) break;
    }
    if (!added) break;
  }
  return selected;
}

function showSwipeScreen() {
  swipeProducts = getSwipeProducts();
  if (swipeProducts.length === 0) { finishSwipe(); return; }
  swipeIndex = 0;

  // ドット生成
  const dotsEl = document.getElementById('swipe-dots');
  dotsEl.innerHTML = swipeProducts.map((_, i) => `<div class="swipe-dot${i === 0 ? ' current' : ''}"></div>`).join('');
  document.getElementById('swipe-tot').textContent = swipeProducts.length;

  renderSwipeCard();
  showScreen('screen-swipe');
}

function renderSwipeCard() {
  const p = swipeProducts[swipeIndex];
  document.getElementById('swipe-cur').textContent = swipeIndex + 1;
  document.getElementById('swipe-type').textContent = p.type;
  document.getElementById('swipe-name').textContent = p.name;
  document.getElementById('swipe-price').textContent = p.price ? `¥${p.price.toLocaleString()}（税込）` : '';

  const wrap = document.getElementById('swipe-img-wrap');
  wrap.innerHTML = p.image
    ? `<img src="${p.image}" alt="${p.name}" loading="eager" onerror="this.onerror=null;this.parentNode.innerHTML='<span class=\\'swipe-icon\\'>${p.icon}</span>'">`
    : `<span class="swipe-icon">${p.icon}</span>`;

  // ドット更新
  document.querySelectorAll('.swipe-dot').forEach((d, i) => {
    d.className = 'swipe-dot' + (i < swipeIndex ? ' done' : i === swipeIndex ? ' current' : '');
  });

  // カードアニメーションリセット
  const card = document.getElementById('swipe-card');
  card.className = 'swipe-card';
  void card.offsetWidth; // reflow
}

function swipeRate(rating) {
  applySwipeRating(swipeProducts[swipeIndex], rating);
  const card = document.getElementById('swipe-card');
  card.classList.add(rating === 'yes' ? 'out-yes' : rating === 'meh' ? 'out-meh' : 'out-no');
  setTimeout(() => {
    swipeIndex++;
    if (swipeIndex >= swipeProducts.length) finishSwipe();
    else renderSwipeCard();
  }, 380);
}

function applySwipeRating(product, rating) {
  if (rating === 'no') return;
  const pull = rating === 'yes' ? 0.35 : -0.12;
  const prof = product.profile;
  ['sweet','bitter','acid','body','strong','fruity'].forEach(k => {
    const diff = (prof[k] || 2) - (userProfile[k] || 2);
    userProfile[k] = Math.max(1, Math.min(5, userProfile[k] + diff * pull));
  });
}

function skipSwipe() { finishSwipe(); }

function finishSwipe() {
  showScreen('screen-question');
  renderQuestion();
}

=================================================== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  el.style.animation = 'none';
  requestAnimationFrame(() => {
    el.style.animation = '';
  });
}

function startQuiz() {
  currentQ = 0;
  answers = [];
  selectedGenre = 'なんでも';
  selectedSubTypes = null;
  selectedSwipeKeyword = null;
  userProfile = { sweet: 3, bitter: 2, acid: 2, body: 2, strong: 2, fruity: 2 };
  renderQuestion();
  showScreen('screen-question');
}

function goBack() {
  if (currentQ === 0) {
    showScreen('screen-welcome');
    return;
  }
  currentQ--;
  // Undo last answer's weight
  if (answers[currentQ]) {
    const ans = answers[currentQ];
    const w = ans.weight;
    if (w) {
      for (const key in w) {
        userProfile[key] = (userProfile[key] || 2) - (w[key] || 0);
      }
    }
    if (ans.genre !== undefined) selectedGenre = 'なんでも';
    if (ans.filterTypes)        selectedSubTypes = null;
    answers.pop();
  }
  renderQuestion();
}

function restartQuiz() {
  showScreen('screen-welcome');
}

/* ===================================================
   RENDER QUESTION
=================================================== */
function renderQuestion() {
  const q = currentQ === 0 ? GENRE_QUESTION : currentGenreQuestions()[currentQ - 1];
  const total = totalQuestions();
  const pct = Math.round((currentQ / total) * 100);

  document.getElementById('progress-text').textContent = `質問 ${currentQ + 1} / ${total}`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  document.getElementById('q-step').textContent = `STEP ${currentQ + 1}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-hint').textContent = q.hint;

  const grid = document.getElementById('q-options');
  grid.innerHTML = '';
  grid.className = q.options.length >= 6 ? 'options-grid many' : 'options-grid';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn ripple';
    btn.setAttribute('aria-label', opt.label);
    btn.innerHTML = `
      <span class="option-icon">${opt.icon}</span>
      <span class="option-label">${opt.label}</span>
      ${opt.sub ? `<span class="option-sub">${opt.sub}</span>` : ''}
    `;
    btn.addEventListener('click', (e) => {
      addRipple(e, btn);
      selectOption(opt, btn);
    });
    grid.appendChild(btn);
  });
}

function addRipple(e, btn) {
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const x = (e.clientX || rect.left + rect.width/2) - rect.left - size/2;
  const y = (e.clientY || rect.top + rect.height/2) - rect.top - size/2;
  const ripple = document.createElement('span');
  ripple.className = 'ripple-effect';
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);
}

function selectOption(opt, btn) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  // ジャンル選択
  if (opt.genre !== undefined) {
    selectedGenre = opt.genre;
  }

  // 味覚プロファイルへの加算
  if (opt.weight) {
    for (const key in opt.weight) {
      userProfile[key] = Math.max(1, Math.min(5, (userProfile[key] || 2) + (opt.weight[key] || 0)));
    }
  }
  answers.push(opt);

  // サブジャンル絞り込み（焼酎・ビール等）
  if (opt.filterTypes) selectedSubTypes = opt.filterTypes;
  // スワイプキーワード（ワイン色等）
  if (opt.swipeKeyword !== undefined) selectedSwipeKeyword = opt.swipeKeyword;

  setTimeout(() => {
    currentQ++;
    if (currentQ >= totalQuestions()) {
      showResults();
    } else if (currentQ === 1 && selectedGenre !== 'なんでも' && selectedGenre !== 'ワイン') {
      // ジャンル選択直後（ワイン以外）→ スワイプ評価画面へ
      showSwipeScreen();
    } else if (currentQ === 2 && selectedGenre === 'ワイン') {
      // ワイン：色・種類を聞いた後 → スワイプ評価画面へ
      showSwipeScreen();
    } else {
      renderQuestion();
    }
  }, 300);
}

/* ===================================================
   SCORING & RESULTS
=================================================== */
function scoreProduct(product) {
  const p = product.profile;
  const u = userProfile;
  const weights = { sweet: 2.0, bitter: 1.8, acid: 1.5, body: 1.5, strong: 1.8, fruity: 1.0 };
  let dist = 0;
  for (const key in weights) {
    const diff = (p[key] || 2) - (u[key] || 2);
    dist += weights[key] * diff * diff;
  }
  const maxDist = Object.values(weights).reduce((a, b) => a + b * 16, 0);
  return Math.round((1 - dist / maxDist) * 100);
}

// カテゴリ多様性を保ちながら上位5件を選ぶ
function selectDiverseTop(scored, n) {
  const result = [];
  const usedCats = {};
  // 1位は純粋に最高スコア
  result.push(scored[0]);
  usedCats[scored[0].type] = 1;
  // 2〜nはカテゴリの重複を最大2に制限
  for (let i = 1; i < scored.length && result.length < n; i++) {
    const p = scored[i];
    const cnt = usedCats[p.type] || 0;
    if (cnt < 2) {
      result.push(p);
      usedCats[p.type] = cnt + 1;
    }
  }
  return result;
}

function getFilteredProducts() {
  // サブジャンル絞り込みが優先（例：芋焼酎のみ）
  const cats = selectedSubTypes || GENRE_MAP[selectedGenre];
  const instock = (typeof PRODUCT_INSTOCK !== 'undefined') ? PRODUCT_INSTOCK : null;
  if (!cats) return instock ? PRODUCTS.filter(p => instock[p.id]) : PRODUCTS;
  const set = new Set(cats);
  return PRODUCTS.filter(p => set.has(p.type) && (!instock || instock[p.id]));
}

  } else {
    selectedProductIds.add(productId);
    document.getElementById('card-' + productId).classList.add('selected-card');
  }
  const count = selectedProductIds.size;
  const btn = document.getElementById('btn-print-main');
  const hint = document.getElementById('select-hint');
  if (btn) {
    btn.disabled = count === 0;
    btn.textContent = count === 0
      ? '🖨️ 選んだ商品を印刷する'
      : `🖨️ ${count}件を印刷する`;
  }
  if (hint) hint.classList.toggle('hidden', count > 0);
}

function printSelected() {
  if (selectedProductIds.size === 0) return;
  const now = new Date();
  const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const slips = [...selectedProductIds].map(id => {
    const p = lastResults.find(r => r.id === id);
    return p ? buildSlipHTML(p, dateStr) : '';
  }).filter(Boolean);
  document.getElementById('print-slip').innerHTML = slips.join('');
  window.print();
}

function buildSlipHTML(p, dateStr) {
  const stars = '★'.repeat(Math.round(p.score / 20)) + '☆'.repeat(5 - Math.round(p.score / 20));
  const tags = (p.tags || []).map(t => `<span class="ps-tag">${t}</span>`).join('');
  const price = p.price ? `¥${p.price.toLocaleString()}<span class="ps-price-tax">（税込）</span>` : '';
  return `<div class="ps-slip">
    <div class="ps-header">
      <div class="ps-store">🍶 おすすめのお酒</div>
      <div class="ps-date">${dateStr}</div>
    </div>
    <div class="ps-headline">✦ あなたへのおすすめ</div>
    <div class="ps-icon">${p.icon}</div>
    <div class="ps-type">${p.type}</div>
    <div class="ps-name">${p.name}</div>
    <div class="ps-desc">${p.desc}</div>
    <div class="ps-tags">${tags}</div>
    <div class="ps-price">${price}</div>
    <div class="ps-pairing-wrap">
      <div class="ps-pairing-label">PAIRING</div>
      <div class="ps-pairing-text">${getPairing(p)}</div>
    </div>
    <div class="ps-match">${stars}  マッチ度 ${p.score}%</div>
    <div class="ps-footer">
      <strong>この紙を店員にお渡しください</strong><br>
      スタッフがお探しします
    </div>
  </div>`;
}

function getDominantFlavor() {
  const u = userProfile;
  const g = selectedGenre === 'なんでも' ? '' : `${selectedGenre}の中から`;
  if (u.sweet >= 4 && u.bitter <= 2) return { title: `🍓 <em>甘口・フルーティ</em>なあなたへ`, sub: `${g}甘みとフルーティさが際立つお酒をご提案します` };
  if (u.sweet <= 2 && u.bitter >= 3) return { title: `⚡ <em>辛口・本格派</em>なあなたへ`,   sub: `${g}キレとコクを兼ね備えたお酒をご提案します` };
  if (u.acid >= 4 && u.body <= 2)   return { title: `🍋 <em>爽やか・さっぱり</em>派のあなたへ`, sub: `${g}酸味とさっぱり感が特徴のお酒をご提案します` };
  if (u.body >= 4 && u.strong >= 4) return { title: `🥃 <em>濃厚・本格</em>派のあなたへ`,   sub: `${g}コクと深みのある力強いお酒をご提案します` };
  if (u.strong <= 2)                return { title: `🌿 <em>軽やか・飲みやすい</em>派のあなたへ`, sub: `${g}飲みやすく軽やかなお酒をご提案します` };
  return { title: `✨ <em>バランス</em>重視のあなたへ`, sub: `${g}あなたの味覚にぴったりのお酒をご提案します` };
}
